<!-- Preconnect to third-party origins used on every page -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="dns-prefetch" href="https://www.google-analytics.com" />
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />

<!-- Botpress webchat (lazy-loaded to protect Core Web Vitals) -->
<script>
  (function () {
    var botpressLoaded = false;
    var botpressLoading = false;
    var idleLoadDelayMs = 3500;

    function loadScript(src, defer) {
      return new Promise(function (resolve, reject) {
        var script = document.createElement("script");
        script.src = src;
        if (defer) script.defer = true;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    function loadBotpress() {
      if (botpressLoaded || botpressLoading) return;
      botpressLoading = true;

      loadScript("https://cdn.botpress.cloud/webchat/v3.6/inject.js", true)
        .then(function () {
          return loadScript("https://files.bpcontent.cloud/2026/03/30/05/20260330054847-0Z89JJKZ.js", true);
        })
        .then(function () {
          botpressLoaded = true;
          removeListeners();
        })
        .catch(function () {
          botpressLoading = false;
        });
    }

    function onFirstInteraction() {
      loadBotpress();
    }

    function addListeners() {
      window.addEventListener("scroll", onFirstInteraction, { passive: true, once: true });
      window.addEventListener("pointerdown", onFirstInteraction, { once: true });
      window.addEventListener("keydown", onFirstInteraction, { once: true });
      window.addEventListener("touchstart", onFirstInteraction, { passive: true, once: true });
    }

    function removeListeners() {
      window.removeEventListener("scroll", onFirstInteraction);
      window.removeEventListener("pointerdown", onFirstInteraction);
      window.removeEventListener("keydown", onFirstInteraction);
      window.removeEventListener("touchstart", onFirstInteraction);
    }

    function scheduleIdleLoad() {
      if ("requestIdleCallback" in window) {
        requestIdleCallback(function () {
          setTimeout(loadBotpress, idleLoadDelayMs);
        }, { timeout: 8000 });
      } else {
        setTimeout(loadBotpress, 8000 + idleLoadDelayMs);
      }
    }

    addListeners();

    if (document.readyState === "complete") {
      scheduleIdleLoad();
    } else {
      window.addEventListener("load", scheduleIdleLoad, { once: true });
    }
  })();
</script>

<!-- Botpress style overrides: friendlier teal brand, neutral header, soft input -->
<style>
  /* Widget variables and overrides (keeps defaults if classes change) */
  .bpw-widget,
  .bpw-app,
  .bpw-window {
    --bpw-accent: #2B8A78;
    /* primary brand */
    --bpw-accent-contrast: #ffffff;
    --bpw-header-bg: #ffffff;
    --bpw-header-fg: #2b2b2b;
    --bpw-input-bg: #f7f9f9;
    --bpw-border-radius: 12px;
  }

  /* Floating button */
  .bpw-floating-button {
    background: var(--bpw-accent) !important;
    color: var(--bpw-accent-contrast) !important;
    right: 24px !important;
    bottom: 24px !important;
    box-shadow: 0 6px 18px rgba(43, 138, 120, 0.18) !important;
  }

  /* Header and title */
  .bpw-header {
    background: var(--bpw-header-bg) !important;
    color: var(--bpw-header-fg) !important;
  }

  .bpw-header__title,
  .bpw-header__subtitle {
    color: var(--bpw-header-fg) !important;
  }

  /* Input area */
  .bpw-input,
  .bpw-send-button {
    background: var(--bpw-input-bg) !important;
  }

  /* Slightly round the chat window */
  .bpw-window,
  .bpw-wrapper {
    border-radius: 12px !important;
    overflow: hidden;
  }

  /* Make the Botpress attribution less visually intrusive */
  .bpw-botpress-badge {
    opacity: 0.7;
    color: #8f8f8f !important;
  }
</style>
